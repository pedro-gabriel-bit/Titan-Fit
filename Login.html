<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Titan Fit</title>
    <link rel="stylesheet" href="css/login.css">
</head>
<body>

    <div class="modal">

        <button class="fechar">X</button>

        <figure>
            <img src="img/logo2.png" alt="Logo Titan Fit">
        </figure>

        <h1>login</h1>
        <p>Entre na sua conta</p>

        <form>
            <label for="email">E-mail ou nome de usuário</label>
            <input type="text" id="email" name="email" placeholder="">

            <button type="submit">continuar</button>

            <span class="divisor">ou</span>

            <button type="button" class="btn-social">
                <img src="img/Logo-google-icon.png" alt="Google">
                Continuar com o Google
            </button>

            <button type="button" class="btn-social">
                <img src="img/apple-logo-icon.png" alt="Apple">
                Continuar com o Apple
            </button>
        </form>

        <div class="cadastro-texto">
            <p>Não tem conta ?</p>
            <a href="cadastro.html">CADASTRA-SE</a>
        </div>

    </div>

</body>
</html>
